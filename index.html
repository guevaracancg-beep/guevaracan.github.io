<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respira - Encuentra tu calma</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Comfortaa:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-fix"></div> <div class="site-wrapper">
    <div class="site-wrapper">
        <header>
            <h1>Respira</h1>
            <p id="instruccion">Relaja tu mente. Sigue el ritmo del agua.</p>
        </header>

        <div class="visual-container">
            <div class="wave-group" id="water-visual">
                <div class="wave wave1"></div>
                <div class="wave wave2"></div>
                <div class="wave wave3"></div>
            </div>
            <div class="text-overlay">
                <p id="texto-guia">Inicio</p>
            </div>
        </div>

        <nav class="tecnicas-nav">
            <button class="btn-tecnica active" onclick="cambiarTecnica('caja')">Caja (4s)</button>
            <button class="btn-tecnica" onclick="cambiarTecnica('478')">4-7-8</button>
            <button class="btn-tecnica" onclick="cambiarTecnica('relajante')">Relajación (4-6)</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>

</html>
